                    <!-- 게시물 본문 -->
                    <div class="post-body">
                        <div class="content"><div><div><br></div><div>&amp; &nbsp; &nbsp;: &nbsp; A &amp; B 일 때, 양쪽 모두를 검사한다.</div><div>&amp;&amp; : &nbsp; A &amp;&amp; B 일 때, A가 0(FALSE)이면 B를 검사하지 않고 0(FALSE)을 반환한다.</div><div><br></div><div>| &nbsp;: &nbsp; A | B 일 때, 양쪽 모두를 검사한다.</div><div>|| : &nbsp; A || B 일 때, A가 1(TRUE)이면 B를 검사하지 않고 1(TRUE)을 반환한다.</div><div><br></div><div><br></div><div>&amp;과 |는 비트 연산자이다.</div></div><div><br></div></div>
